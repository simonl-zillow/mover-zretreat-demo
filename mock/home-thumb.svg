<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <pattern id="smallgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100,170,255,0.12)" stroke-width="0.5"/>
    </pattern>
    <pattern id="majorgrid" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(100,170,255,0.22)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0d1b3e"/>
  <rect width="800" height="600" fill="url(#smallgrid)"/>
  <rect width="800" height="600" fill="url(#majorgrid)"/>

  <!-- Ground line -->
  <line x1="80" y1="478" x2="720" y2="478" stroke="rgba(100,170,255,0.45)" stroke-width="1" stroke-dasharray="10,5"/>

  <!-- House body -->
  <rect x="165" y="278" width="470" height="200" fill="rgba(100,170,255,0.04)" stroke="#a8d4f0" stroke-width="1.5"/>

  <!-- Roof -->
  <polyline points="130,278 400,118 670,278" fill="none" stroke="#a8d4f0" stroke-width="1.5"/>

  <!-- Ridge line (dashed) -->
  <line x1="400" y1="118" x2="400" y2="278" stroke="rgba(100,170,255,0.35)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Chimney -->
  <rect x="492" y="138" width="36" height="72" fill="rgba(100,170,255,0.04)" stroke="#a8d4f0" stroke-width="1.5"/>

  <!-- Left window -->
  <rect x="198" y="312" width="84" height="68" fill="rgba(100,170,255,0.06)" stroke="#a8d4f0" stroke-width="1.5"/>
  <line x1="240" y1="312" x2="240" y2="380" stroke="rgba(100,170,255,0.45)" stroke-width="0.75"/>
  <line x1="198" y1="346" x2="282" y2="346" stroke="rgba(100,170,255,0.45)" stroke-width="0.75"/>

  <!-- Right window -->
  <rect x="518" y="312" width="84" height="68" fill="rgba(100,170,255,0.06)" stroke="#a8d4f0" stroke-width="1.5"/>
  <line x1="560" y1="312" x2="560" y2="380" stroke="rgba(100,170,255,0.45)" stroke-width="0.75"/>
  <line x1="518" y1="346" x2="602" y2="346" stroke="rgba(100,170,255,0.45)" stroke-width="0.75"/>

  <!-- Door -->
  <rect x="343" y="358" width="114" height="120" fill="rgba(100,170,255,0.04)" stroke="#a8d4f0" stroke-width="1.5"/>
  <line x1="343" y1="410" x2="457" y2="410" stroke="rgba(100,170,255,0.35)" stroke-width="0.75"/>
  <circle cx="441" cy="420" r="4" fill="none" stroke="#a8d4f0" stroke-width="1.2"/>

  <!-- Width dimension line -->
  <line x1="165" y1="512" x2="635" y2="512" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>
  <line x1="165" y1="505" x2="165" y2="519" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>
  <line x1="635" y1="505" x2="635" y2="519" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>

  <!-- Height dimension line -->
  <line x1="110" y1="118" x2="110" y2="478" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>
  <line x1="103" y1="118" x2="117" y2="118" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>
  <line x1="103" y1="478" x2="117" y2="478" stroke="rgba(100,170,255,0.38)" stroke-width="0.75"/>

  <!-- Label -->
  <text x="400" y="554" font-family="monospace" font-size="11" fill="rgba(100,170,255,0.45)" text-anchor="middle" letter-spacing="5">SAMPLE LISTING</text>

  <!-- Corner registration marks -->
  <g stroke="rgba(100,170,255,0.28)" stroke-width="0.75">
    <line x1="18" y1="28" x2="42" y2="28"/><line x1="30" y1="16" x2="30" y2="40"/>
    <line x1="758" y1="28" x2="782" y2="28"/><line x1="770" y1="16" x2="770" y2="40"/>
    <line x1="18" y1="572" x2="42" y2="572"/><line x1="30" y1="560" x2="30" y2="584"/>
    <line x1="758" y1="572" x2="782" y2="572"/><line x1="770" y1="560" x2="770" y2="584"/>
  </g>
</svg>
